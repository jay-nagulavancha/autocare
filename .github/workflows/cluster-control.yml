name: Cluster Control (Start / Stop)

# Manual trigger — go to Actions tab → "Cluster Control" → Run workflow
on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - start
          - stop
      cluster_name:
        description: 'EKS cluster name'
        required: true
        default: 'autocare-eks'
      aws_region:
        description: 'AWS region'
        required: true
        default: 'us-west-2'
      desired_nodes:
        description: 'Number of nodes to start with (start only)'
        required: false
        default: '2'

permissions:
  id-token: write
  contents: read

jobs:
  cluster-control:
    name: ${{ github.event.inputs.action == 'start' && 'Start Cluster' || 'Stop Cluster' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ github.event.inputs.aws_region }}

      - name: Start cluster
        if: github.event.inputs.action == 'start'
        run: |
          chmod +x autocare-infra/scripts/cluster-start.sh
          autocare-infra/scripts/cluster-start.sh \
            "${{ github.event.inputs.cluster_name }}" \
            "${{ github.event.inputs.aws_region }}" \
            "${{ github.event.inputs.desired_nodes }}"

      - name: Stop cluster
        if: github.event.inputs.action == 'stop'
        run: |
          chmod +x autocare-infra/scripts/cluster-stop.sh
          autocare-infra/scripts/cluster-stop.sh \
            "${{ github.event.inputs.cluster_name }}" \
            "${{ github.event.inputs.aws_region }}"
