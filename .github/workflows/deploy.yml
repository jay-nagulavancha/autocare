name: Deploy to EKS

on:
  push:
    branches:
      - main

permissions:
  id-token: write   # required for OIDC
  contents: write   # required for git push in update-manifests job

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Job 1 — Run tests for all three services
  # ─────────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Test user-auth-service
        working-directory: autocare/user-auth-service
        run: ./mvnw test -B

      - name: Test vehicle-maintenance-service
        working-directory: autocare/vehicle-maintenance-service
        run: ./mvnw test -B

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: autocare/vehicle-maintenance-ui/package-lock.json

      - name: Test vehicle-maintenance-ui
        working-directory: autocare/vehicle-maintenance-ui
        run: |
          npm ci
          npm run test
        # Note: skipped if no test files exist — add tests to src/**/*.test.tsx to enable

  # ─────────────────────────────────────────────────────────────────
  # Job 2 — Build Docker images and push to ECR
  # ─────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push user-auth-service
        run: |
          docker build \
            -t ${{ secrets.ECR_REGISTRY }}/autocare/user-auth-service:${{ github.sha }} \
            autocare/user-auth-service/
          docker push ${{ secrets.ECR_REGISTRY }}/autocare/user-auth-service:${{ github.sha }}

      - name: Build and push vehicle-maintenance-service
        run: |
          docker build \
            -t ${{ secrets.ECR_REGISTRY }}/autocare/vehicle-maintenance-service:${{ github.sha }} \
            autocare/vehicle-maintenance-service/
          docker push ${{ secrets.ECR_REGISTRY }}/autocare/vehicle-maintenance-service:${{ github.sha }}

      - name: Build and push vehicle-maintenance-ui
        run: |
          docker build \
            --build-arg VITE_AUTH_API_URL=${{ secrets.VITE_AUTH_API_URL }} \
            --build-arg VITE_MAINTENANCE_API_URL=${{ secrets.VITE_MAINTENANCE_API_URL }} \
            -t ${{ secrets.ECR_REGISTRY }}/autocare/vehicle-maintenance-ui:${{ github.sha }} \
            autocare/vehicle-maintenance-ui/
          docker push ${{ secrets.ECR_REGISTRY }}/autocare/vehicle-maintenance-ui:${{ github.sha }}

  # ─────────────────────────────────────────────────────────────────
  # Job 3 — Update image tags in manifests and commit (GitOps)
  # ArgoCD detects the commit and syncs the cluster — no kubectl here
  # ─────────────────────────────────────────────────────────────────
  update-manifests:
    name: Update Manifest Image Tags
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Update image tags in deployment manifests
        env:
          SHA: ${{ github.sha }}
          ECR: ${{ secrets.ECR_REGISTRY }}
        run: |
          # Target only the image: line to avoid matching comments or other fields
          sed -i "s|image: ${ECR}/autocare/user-auth-service:.*|image: ${ECR}/autocare/user-auth-service:${SHA}|g" \
            autocare-infra/k8s/deployments/user-auth-service.yaml
          sed -i "s|image: ${ECR}/autocare/vehicle-maintenance-service:.*|image: ${ECR}/autocare/vehicle-maintenance-service:${SHA}|g" \
            autocare-infra/k8s/deployments/vehicle-maintenance-service.yaml
          sed -i "s|image: ${ECR}/autocare/vehicle-maintenance-ui:.*|image: ${ECR}/autocare/vehicle-maintenance-ui:${SHA}|g" \
            autocare-infra/k8s/deployments/vehicle-maintenance-ui.yaml

      - name: Commit and push updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add autocare-infra/k8s/deployments/
          git commit -m "chore: update image tags to ${{ github.sha }} [skip ci]"
          git push
